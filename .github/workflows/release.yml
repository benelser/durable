name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update -q
          case "${{ matrix.target }}" in
            aarch64-unknown-linux-gnu)
              sudo apt-get install -yq gcc-aarch64-linux-gnu
              echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
              ;;
            aarch64-unknown-linux-musl)
              sudo apt-get install -yq gcc-aarch64-linux-gnu musl-tools
              echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
              ;;
            x86_64-unknown-linux-musl)
              sudo apt-get install -yq musl-tools
              ;;
          esac

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }} 

      - name: Create archive
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            7z a ../../../durable-runtime-${{ matrix.target }}.zip durable.exe
          else
            tar czf ../../../durable-runtime-${{ matrix.target }}.tar.gz durable
          fi

      - name: Transform README for PyPI
        shell: bash
        run: |
          if [ -f README.md ]; then
            # Strip <picture>, <source>, <details>, <summary> tags for PyPI compatibility
            sed -e 's/<picture[^>]*>//g' -e 's/<\/picture>//g' \
                -e 's/<source[^>]*>//g' -e 's/<\/source>//g' \
                -e 's/<details[^>]*>//g' -e 's/<\/details>//g' \
                -e 's/<summary[^>]*>//g' -e 's/<\/summary>//g' \
                README.md > README.pypi.md
          fi

      - name: Build maturin wheel
        uses: PyO3/maturin-action@db323e2cf5679b7feb8bcb561a36b27a0bc19e79  # v1
        with:
          target: ${{ matrix.target }}
          args: --release --bindings bin --strip
          manylinux: auto

      - name: Compute SHA-256
        shell: bash
        run: |
          shopt -s nullglob
          for f in durable-runtime-${{ matrix.target }}.* target/wheels/*.whl; do
            if [ -f "$f" ]; then
              sha256sum "$f" > "$f.sha256" 2>/dev/null || shasum -a 256 "$f" > "$f.sha256"
            fi
          done

      - name: Smoke test
        if: |
          runner.os != 'Windows' &&
          !(runner.arch == 'X64' && contains(matrix.target, 'aarch64'))
        run: |
          target/${{ matrix.target }}/release/durable --help

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: archive-${{ matrix.target }}
          path: |
            durable-runtime-${{ matrix.target }}.*

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: wheels-${{ matrix.target }}
          path: target/wheels/*.whl

  release:
    name: GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          pattern: archive-*
          path: artifacts
          merge-multiple: true


      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2
        with:
          files: artifacts/*
          generate_release_notes: true

  publish-pypi:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/durable-runtime
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  publish-npm:
    name: Publish to npm
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          pattern: archive-*
          path: artifacts
          merge-multiple: true

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Publish platform packages
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p npm-darwin-arm64/bin
          if [[ -f "artifacts/durable-runtime-aarch64-apple-darwin.tar.gz" ]]; then
            tar xzf "artifacts/durable-runtime-aarch64-apple-darwin.tar.gz" -C "npm-darwin-arm64/bin/"
          elif [[ -f "artifacts/durable-runtime-aarch64-apple-darwin.zip" ]]; then
            unzip -o "artifacts/durable-runtime-aarch64-apple-darwin.zip" -d "npm-darwin-arm64/bin/"
          fi
          cat > "npm-darwin-arm64/package.json" << PKGJSON
          {"name":"@benelser/durable-darwin-arm64","version":"${VERSION}","os":["darwin"],"cpu":["arm64"],"bin":{"durable":"bin/durable"},"preferUnplugged":true}
          PKGJSON
          cd "npm-darwin-arm64" && npm publish --provenance --access public && cd ..
          mkdir -p npm-darwin-x64/bin
          if [[ -f "artifacts/durable-runtime-x86_64-apple-darwin.tar.gz" ]]; then
            tar xzf "artifacts/durable-runtime-x86_64-apple-darwin.tar.gz" -C "npm-darwin-x64/bin/"
          elif [[ -f "artifacts/durable-runtime-x86_64-apple-darwin.zip" ]]; then
            unzip -o "artifacts/durable-runtime-x86_64-apple-darwin.zip" -d "npm-darwin-x64/bin/"
          fi
          cat > "npm-darwin-x64/package.json" << PKGJSON
          {"name":"@benelser/durable-darwin-x64","version":"${VERSION}","os":["darwin"],"cpu":["x64"],"bin":{"durable":"bin/durable"},"preferUnplugged":true}
          PKGJSON
          cd "npm-darwin-x64" && npm publish --provenance --access public && cd ..
          mkdir -p npm-linux-arm64/bin
          if [[ -f "artifacts/durable-runtime-aarch64-unknown-linux-gnu.tar.gz" ]]; then
            tar xzf "artifacts/durable-runtime-aarch64-unknown-linux-gnu.tar.gz" -C "npm-linux-arm64/bin/"
          elif [[ -f "artifacts/durable-runtime-aarch64-unknown-linux-gnu.zip" ]]; then
            unzip -o "artifacts/durable-runtime-aarch64-unknown-linux-gnu.zip" -d "npm-linux-arm64/bin/"
          fi
          cat > "npm-linux-arm64/package.json" << PKGJSON
          {"name":"@benelser/durable-linux-arm64","version":"${VERSION}","os":["linux"],"cpu":["arm64"],"bin":{"durable":"bin/durable"},"preferUnplugged":true}
          PKGJSON
          cd "npm-linux-arm64" && npm publish --provenance --access public && cd ..
          mkdir -p npm-linux-x64/bin
          if [[ -f "artifacts/durable-runtime-x86_64-unknown-linux-gnu.tar.gz" ]]; then
            tar xzf "artifacts/durable-runtime-x86_64-unknown-linux-gnu.tar.gz" -C "npm-linux-x64/bin/"
          elif [[ -f "artifacts/durable-runtime-x86_64-unknown-linux-gnu.zip" ]]; then
            unzip -o "artifacts/durable-runtime-x86_64-unknown-linux-gnu.zip" -d "npm-linux-x64/bin/"
          fi
          cat > "npm-linux-x64/package.json" << PKGJSON
          {"name":"@benelser/durable-linux-x64","version":"${VERSION}","os":["linux"],"cpu":["x64"],"bin":{"durable":"bin/durable"},"preferUnplugged":true}
          PKGJSON
          cd "npm-linux-x64" && npm publish --provenance --access public && cd ..
          mkdir -p npm-linux-x64/bin
          if [[ -f "artifacts/durable-runtime-x86_64-unknown-linux-musl.tar.gz" ]]; then
            tar xzf "artifacts/durable-runtime-x86_64-unknown-linux-musl.tar.gz" -C "npm-linux-x64/bin/"
          elif [[ -f "artifacts/durable-runtime-x86_64-unknown-linux-musl.zip" ]]; then
            unzip -o "artifacts/durable-runtime-x86_64-unknown-linux-musl.zip" -d "npm-linux-x64/bin/"
          fi
          cat > "npm-linux-x64/package.json" << PKGJSON
          {"name":"@benelser/durable-linux-x64","version":"${VERSION}","os":["linux"],"cpu":["x64"],"bin":{"durable":"bin/durable"},"preferUnplugged":true}
          PKGJSON
          cd "npm-linux-x64" && npm publish --provenance --access public && cd ..
          mkdir -p npm-win32-x64/bin
          if [[ -f "artifacts/durable-runtime-x86_64-pc-windows-msvc.tar.gz" ]]; then
            tar xzf "artifacts/durable-runtime-x86_64-pc-windows-msvc.tar.gz" -C "npm-win32-x64/bin/"
          elif [[ -f "artifacts/durable-runtime-x86_64-pc-windows-msvc.zip" ]]; then
            unzip -o "artifacts/durable-runtime-x86_64-pc-windows-msvc.zip" -d "npm-win32-x64/bin/"
          fi
          cat > "npm-win32-x64/package.json" << PKGJSON
          {"name":"@benelser/durable-win32-x64","version":"${VERSION}","os":["win32"],"cpu":["x64"],"bin":{"durable":"bin/durable.exe"},"preferUnplugged":true}
          PKGJSON
          cd "npm-win32-x64" && npm publish --provenance --access public && cd ..


  publish-crates:
    name: Publish to crates.io
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Publish to crates.io
        run: cargo publish 
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  dispatch-homebrew:
    name: Update Homebrew tap
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to tap repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          repository: benelser/homebrew-durable
          event-type: update-formula
          client-payload: '{"version": "${{ github.ref_name }}"}'

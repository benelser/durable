name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: manylinux_2_17_x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: manylinux_2_17_aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: macosx_10_12_x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macosx_11_0_arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win_amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build Rust binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build wheel

      - name: Bundle binary into SDK
        shell: bash
        run: |
          mkdir -p sdks/python/durable/_bin
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/durable.exe sdks/python/durable/_bin/durable.exe
          else
            cp target/${{ matrix.target }}/release/durable sdks/python/durable/_bin/durable
            chmod +x sdks/python/durable/_bin/durable
          fi

      - name: Build wheel
        working-directory: sdks/python
        shell: bash
        run: |
          # Build a platform-specific wheel
          python -m build --wheel --outdir dist/
          # Rename wheel to correct platform tag
          cd dist
          for f in *.whl; do
            # Replace the generic platform tag with the correct one
            new_name=$(echo "$f" | sed "s/py3-none-any/${{ matrix.platform }}/")
            if [[ "$f" != "$new_name" ]]; then
              mv "$f" "$new_name"
            fi
          done

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: sdks/python/dist/*.whl

  # Also build a pure-Python "sdist" (no binary — for building from source)
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install build
      - run: python -m build --sdist --outdir dist/
        working-directory: sdks/python
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: sdks/python/dist/*.tar.gz

  publish:
    needs: [build, sdist]
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_API_TOKEN }}

  github-release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.whl
          generate_release_notes: true

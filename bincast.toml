[package]
name = "delite-core"
binary = "delite"
description = "The sqlite of durable agent execution â crash-recoverable AI agents with exactly-once semantics. Zero dependencies."
repository = "https://github.com/benelser/durable"
license = "MIT"

[targets]
platforms = [
  "aarch64-apple-darwin",
  "x86_64-apple-darwin",
  "aarch64-unknown-linux-gnu",
  "x86_64-unknown-linux-gnu",
  "x86_64-unknown-linux-musl",
  "x86_64-pc-windows-msvc",
]

[distribute.github]
release = true

[distribute.pypi]
package_name = "delite-core"

[distribute.npm]
scope = "@bjelser"

[distribute.homebrew]
tap = "benelser/homebrew-tap"

[distribute.cargo]
crate_name = "delite-core"

[distribute.install_script]
enabled = true
